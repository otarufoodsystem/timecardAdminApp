<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFSタイムカード 管理画面</title>
  <style>
    #protection-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #22252a; z-index: 99999;
      display: flex; justify-content: center; align-items: center;
      color: white; font-weight: bold; font-size: 1.2rem;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif; 
      background-color: #f4f6f9; 
      color: #333; 
      height: 100%;
    }

    /* パソコンなどの大画面でのみ全体スクロールを禁止 */
    @media (min-width: 768px) {
      html, body { overflow: hidden; }
    }

    /* ヘッダー */
    .header { 
      background-color: #22252a; 
      color: white; 
      padding: 10px 20px; 
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }
    .header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
    .header .version { font-size: 0.8rem; color: #c29d38; font-family: monospace; font-weight: bold; }
    
    /* タブメニュー（横スクロール可能に調整） */
    .tabs { 
      display: flex; 
      gap: 5px; 
      border-bottom: 2px solid #ccc; 
      padding: 8px 15px 0 15px; 
      background-color: #fff;
      overflow-x: auto;
      white-space: nowrap;
    }
    .tabs::-webkit-scrollbar { display: none; } /* タブのスクロールバーは隠す */
    .tab-btn { padding: 8px 12px; font-size: 0.9rem; font-weight: bold; background: none; border: none; cursor: pointer; color: #666; border-radius: 5px 5px 0 0; transition: 0.2s; white-space: nowrap; }
    .tab-btn.active { color: #c29d38; border-bottom: 4px solid #c29d38; background-color: #fff; }
    
    /* メインコンテナ */
    .container { 
      max-width: 1300px; 
      margin: 0 auto; 
      padding: 15px; 
      box-sizing: border-box; 
    }
    @media (min-width: 768px) {
      .container { height: calc(100% - 95px); } 
    }
    
    /* タブの中身 */
    .tab-content { 
      display: none; 
      background: white; 
      padding: 15px; 
      border-radius: 8px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
      box-sizing: border-box;
    }
    @media (min-width: 768px) {
      .tab-content { height: 100%; }
    }
    .tab-content.active { display: block; }

    /* レイアウト格子 */
    .view-grid { 
      display: flex;
      flex-direction: column;
      gap: 20px; 
    }
    @media (min-width: 768px) { 
      .view-grid { 
        display: grid;
        grid-template-columns: 320px 1fr; 
        height: 100%;
      } 
    }

    /* 左側：フォームボックス */
    .form-box { background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #ddd; height: fit-content; box-sizing: border-box; }
    .form-box h3 { margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 5px; color: #444; font-size: 1rem; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 4px; color: #555; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
    .form-group textarea { resize: vertical; height: 70px; }
    .form-group small { color: #777; font-size: 0.75rem; display: block; margin-top: 2px; }
    .btn-row { display: flex; gap: 10px; margin-top: 15px; }
    
    .btn { padding: 8px 12px; font-size: 0.85rem; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; text-align: center; }
    .btn-primary { background-color: #28a745; color: white; flex: 1; }
    .btn-primary:hover { background-color: #218838; }
    .btn-clear { background-color: #6c757d; color: white; }
    .btn-danger { background-color: #dc3545; color: white; padding: 4px 8px; font-size: 0.75rem; }
    .btn-edit { background-color: #007bff; color: white; padding: 4px 8px; font-size: 0.75rem; margin-right: 3px; }

    /* 右側：リストエリアコンテナ */
    .list-area-container {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    @media (min-width: 768px) {
      .list-area-container { height: 100%; overflow: hidden; }
    }
    .list-area-container h3 { margin-top: 0; margin-bottom: 10px; font-size: 1rem; }

    /* テーブルのスクロール設定 */
    .table-container { 
      overflow-x: auto;
      border: 1px solid #eee;
      border-radius: 4px;
      box-sizing: border-box;
    }
    @media (min-width: 768px) {
      .table-container { 
        overflow-y: auto;  
        flex: 1;           
      }
    }
    
    .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
    .table-container::-webkit-scrollbar-track { background: #f1f1f1; }
    .table-container::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; min-width: 550px; } 
    
    th { background-color: #f1f3f5; font-weight: bold; }
    @media (min-width: 768px) {
      th { position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 0 #ddd; }
    }
    th, td { padding: 8px 10px; border-bottom: 1px solid #ddd; word-break: break-all; }
    tr:hover { background-color: #f8f9fa; }

    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: none; justify-content: center; align-items: center; z-index: 9999; font-weight: bold; font-size: 1.2rem; color: #c29d38; }
  </style>
</head>
<body>

<div id="protection-overlay">認証確認中...</div>

<div class="header">
  <h1>⚙️ OFSタイムカード 管理画面</h1>
  <span class="version" id="app-version">...</span>
</div>

<div class="tabs">
  <button id="tab-staff-btn" class="tab-btn active" onclick="switchTab('staff')">👤 スタッフ一覧メンテ</button>
  <button id="tab-store-btn" class="tab-btn" onclick="switchTab('store')">🏪 店舗一覧メンテ</button>
  <button id="tab-comment-btn" class="tab-btn" onclick="switchTab('comment')">💬 コメント一覧メンテ</button>
</div>

<div class="container">
  
  <div id="tab-staff" class="tab-content active">
    <div class="view-grid">
      <div class="form-box">
        <h3 id="staff-form-title">スタッフ登録・編集</h3>
        <input type="hidden" id="staff-row-index" value="">
        <div class="form-group">
          <label for="staff-name">氏名</label>
          <input type="text" id="staff-name" placeholder="例: 山田太郎">
        </div>
        <div class="form-group">
          <label for="staff-stores">出勤店舗 (カンマ区切り)</label>
          <input type="text" id="staff-stores" placeholder="例: 真兵衛,小樽坂">
          <small>※店舗一覧にある正確な店舗名を入力してください</small>
        </div>
        <div class="form-group">
          <label for="staff-hours">標準勤務時間 (時間数)</label>
          <input type="text" id="staff-hours" value="08:00" placeholder="例: 08:00">
          <small>※1日あたりの所定労働時間数です</small>
        </div>
        <div class="btn-row">
          <button class="btn btn-clear" onclick="clearStaffForm()">クリア</button>
          <button class="btn btn-primary" onclick="submitStaffForm()">保存する</button>
        </div>
      </div>
      <div class="list-area-container">
        <h3>登録スタッフ一覧</h3>
        <div class="table-container">
          <table>
            <thead><tr><th>氏名</th><th>所属・出勤店舗</th><th>標準勤務時間</th><th>操作</th></tr></thead>
            <tbody id="staff-table-body"><tr><td colspan="4">読み込み中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-store" class="tab-content">
    <div class="view-grid">
      <div class="form-box">
        <h3 id="store-form-title">店舗登録・編集</h3>
        <input type="hidden" id="store-row-index" value="">
        <div class="form-group">
          <label for="store-name">店舗名</label>
          <input type="text" id="store-name" placeholder="例: 真兵衛">
        </div>
        <div class="form-group">
          <label for="store-lat">緯度</label>
          <input type="number" step="any" id="store-lat" placeholder="例: 43.1907">
        </div>
        <div class="form-group">
          <label for="store-lng">経度</label>
          <input type="number" step="any" id="store-lng" placeholder="例: 141.005">
        </div>
        <div class="form-group">
          <label for="store-radius">GPS許容範囲(m)</label>
          <input type="number" id="store-radius" value="100">
        </div>
        <div class="form-group">
          <label for="store-in-marume">INまるめ(分)</label>
          <input type="number" id="store-in-marume" value="15">
        </div>
        <div class="form-group">
          <label for="store-out-marume">OUTまるめ(分)</label>
          <input type="number" id="store-out-marume" value="1">
        </div>
        <div class="btn-row">
          <button class="btn btn-clear" onclick="clearStoreForm()">クリア</button>
          <button class="btn btn-primary" onclick="submitStoreForm()">保存する</button>
        </div>
      </div>
      <div class="list-area-container">
        <h3>登録店舗一覧</h3>
        <div class="table-container">
          <table>
            <thead><tr><th>店舗名</th><th>位置情報</th><th>許容径</th><th>まるめ(IN/OUT)</th><th>操作</th></tr></thead>
            <tbody id="store-table-body"><tr><td colspan="5">登録データを読み込み中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-comment" class="tab-content">
    <div class="view-grid">
      <div class="form-box">
        <h3 id="comment-form-title">コメント登録・編集</h3>
        <input type="hidden" id="comment-row-index" value="">
        <div class="form-group">
          <label for="comment-target">通知対象</label>
          <input type="text" id="comment-target" placeholder="全員 または 店舗名 または 個人名">
          <small>※「全員」以外を指定する場合は正確な名称を入れてください</small>
        </div>
        <div class="form-group">
          <label for="comment-text">コメント内容</label>
          <textarea id="comment-text" placeholder="ポップアップで表示させたい文章を入力してください"></textarea>
        </div>
        <div class="form-group">
          <label for="comment-from">表示期間 From</label>
          <input type="date" id="comment-from">
        </div>
        <div class="form-group">
          <label for="comment-to">表示期間 To</label>
          <input type="date" id="comment-to">
        </div>
        <div class="btn-row">
          <button class="btn btn-clear" onclick="clearCommentForm()">クリア</button>
          <button class="btn btn-primary" onclick="submitCommentForm()">保存する</button>
        </div>
      </div>
      <div class="list-area-container">
        <h3>登録コメント通知一覧</h3>
        <div class="table-container">
          <table>
            <thead><tr><th>通知対象</th><th>コメント内容</th><th>表示期間</th><th>操作</th></tr></thead>
            <tbody id="comment-table-body"><tr><td colspan="4">登録データを読み込み中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="loading">処理中...</div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzwmh6NwZiCjJTNPQ04Y_leA_WhTPVTClh3qNHdi3RxNDOhKctRE5MqYPMzBXPl4639/exec";
  
  let currentPassword = localStorage.getItem("admin_saved_password") || "";
  let lastAuthTime = localStorage.getItem("admin_last_auth_time") || "0";

  window.onload = async function() {
    await runAuthentication();
  };

  async function runAuthentication() {
    const overlay = document.getElementById("protection-overlay");
    const now = Date.now();
    const tenMinutes = 10 * 60 * 1000;

    if (now - parseInt(lastAuthTime, 10) > tenMinutes) {
      currentPassword = "";
      clearAuthStorage();
    }
    
    while (!currentPassword) {
      const input = prompt("管理用パスワードを入力してください（10分間有効）：");
      if (input === null) {
        overlay.innerText = "パスワードが入力されなかったため、画面を表示できません。再読込してください。";
        return;
      }
      if (input.trim() !== "") {
        currentPassword = input.trim();
      }
    }

    showLoading(true);
    try {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "checkAuth", password: currentPassword })
      });
      const resData = await responseToJson(response);
      
      if (resData.success) {
        localStorage.setItem("admin_saved_password", currentPassword);
        localStorage.setItem("admin_last_auth_time", Date.now().toString());
        
        if (resData.version) {
          document.getElementById("app-version").innerText = resData.version;
        }

        overlay.style.display = "none";
        showLoading(false);
        
        // 全データを裏でロード
        loadStaffList();
        loadStoreList();
        loadCommentList();
      } else {
        clearAuthStorage();
        currentPassword = "";
        alert("パスワードが違います。");
        runAuthentication();
      }
    } catch (e) {
      overlay.innerText = "通信エラーが発生しました。リロードしてください。";
    }
  }

  async function callGas(action, data = null) {
    const payload = { action: action, password: currentPassword };
    if (data) payload.data = data;
    if (data && data.rowIndex) { payload.rowIndex = data.rowIndex; delete data.rowIndex; }
    if (action.startsWith("delete")) payload.rowIndex = data; // deleteStaff, deleteStore, deleteComment

    try {
      const response = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) });
      const resData = await responseToJson(response);
      localStorage.setItem("admin_last_auth_time", Date.now().toString());
      return resData;
    } catch (error) {
      alert("通信エラーが発生しました:\n" + error.message);
      showLoading(false);
      throw error;
    }
  }

  async function responseToJson(response) {
    const resData = await response.json();
    if (resData.authError) {
      clearAuthStorage();
      alert("セッションの有効期限が切れたか、パスワードが変更されました。再入力してください。");
      location.reload();
      throw new Error("Auth Error");
    }
    if (!resData.success) throw new Error(resData.error);
    return resData;
  }

  function clearAuthStorage() {
    localStorage.removeItem("admin_saved_password");
    localStorage.removeItem("admin_last_auth_time");
  }

  function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
  
  function switchTab(type) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(`tab-${type}-btn`).classList.add('active');
    document.getElementById(`tab-${type}`).classList.add('active');
  }

  // --- スタッフ機能 ---
  let globalStaffList = [];
  async function loadStaffList() {
    try {
      const res = await callGas("getStaffList");
      globalStaffList = res.data;
      const tbody = document.getElementById('staff-table-body');
      tbody.innerHTML = '';
      if(globalStaffList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">登録スタッフはいません</td></tr>';
        return;
      }
      globalStaffList.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><strong>${item.name}</strong></td><td>${item.stores}</td><td>${item.standardHours}</td>
          <td>
            <button class="btn btn-edit" onclick="editStaff(${item.rowIndex})">編集</button>
            <button class="btn btn-danger" onclick="deleteStaff(${item.rowIndex}, '${item.name}')">削除</button>
          </td>`;
        tbody.appendChild(tr);
      });
    } catch(e) {}
  }
  function editStaff(rowIndex) {
    const item = globalStaffList.find(s => s.rowIndex === rowIndex);
    if(!item) return;
    document.getElementById('staff-row-index').value = item.rowIndex;
    document.getElementById('staff-name').value = item.name;
    document.getElementById('staff-stores').value = item.stores;
    document.getElementById('staff-hours').value = item.standardHours;
    document.getElementById('staff-form-title').innerText = "スタッフ編集 (上書き)";
    if (window.innerWidth < 768) { window.scrollTo({ top: 0, behavior: 'smooth' }); }
  }
  function clearStaffForm() {
    document.getElementById('staff-row-index').value = "";
    document.getElementById('staff-name').value = "";
    document.getElementById('staff-stores').value = "";
    document.getElementById('staff-hours').value = "08:00";
    document.getElementById('staff-form-title').innerText = "スタッフ登録・編集";
  }
  async function submitStaffForm() {
    const name = document.getElementById('staff-name').value;
    const stores = document.getElementById('staff-stores').value;
    const hours = document.getElementById('staff-hours').value;
    const rowIndex = document.getElementById('staff-row-index').value;
    if(!name || !stores) { alert("氏名と出勤店舗は必須です"); return; }
    showLoading(true);
    const res = await callGas("saveStaff", { rowIndex: rowIndex ? Number(rowIndex) : null, name: name, stores: stores, standardHours: hours });
    showLoading(false); alert(res.message); clearStaffForm(); loadStaffList();
  }
  async function deleteStaff(rowIndex, name) {
    if(!confirm(`本当に ${name} さんを削除しますか？`)) return;
    showLoading(true);
    const res = await callGas("deleteStaff", rowIndex);
    showLoading(false); alert(res.message); clearStaffForm(); loadStaffList();
  }

  // --- 店舗機能 ---
  let globalStoreList = [];
  async function loadStoreList() {
    try {
      const res = await callGas("getStoreList");
      globalStoreList = res.data;
      const tbody = document.getElementById('store-table-body');
      tbody.innerHTML = '';
      if(globalStoreList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">登録店舗はありません</td></tr>';
        return;
      }
      globalStoreList.forEach(item => {
        const tr = document.createElement('tr');
        const geo = (item.lat && item.lng) ? `${item.lat}, ${item.lng}` : '未設定';
        tr.innerHTML = `<td><strong>${item.storeName}</strong></td><td><small>${geo}</small></td><td>${item.radius}m</td><td>IN:${item.inMarume}分/OUT:${item.outMarume}分</td>
          <td>
            <button class="btn btn-edit" onclick="editStore(${item.rowIndex})">編集</button>
            <button class="btn btn-danger" onclick="deleteStore(${item.rowIndex}, '${item.storeName}')">削除</button>
          </td>`;
        tbody.appendChild(tr);
      });
    } catch(e) {}
  }
  function editStore(rowIndex) {
    const item = globalStoreList.find(s => s.rowIndex === rowIndex);
    if(!item) return;
    document.getElementById('store-row-index').value = item.rowIndex;
    document.getElementById('store-name').value = item.storeName;
    document.getElementById('store-lat').value = item.lat;
    document.getElementById('store-lng').value = item.lng;
    document.getElementById('store-radius').value = item.radius;
    document.getElementById('store-in-marume').value = item.inMarume;
    document.getElementById('store-out-marume').value = item.outMarume;
    document.getElementById('store-form-title').innerText = "店舗編集 (上書き)";
    if (window.innerWidth < 768) { window.scrollTo({ top: 0, behavior: 'smooth' }); }
  }
  function clearStoreForm() {
    document.getElementById('store-row-index').value = "";
    document.getElementById('store-name').value = "";
    document.getElementById('store-lat').value = "";
    document.getElementById('store-lng').value = "";
    document.getElementById('store-radius').value = "100";
    document.getElementById('store-in-marume').value = "15";
    document.getElementById('store-out-marume').value = "15";
    document.getElementById('store-form-title').innerText = "店舗登録・編集";
  }
  async function submitStoreForm() {
    const storeName = document.getElementById('store-name').value;
    const lat = document.getElementById('store-lat').value;
    const lng = document.getElementById('store-lng').value;
    const radius = document.getElementById('store-radius').value;
    const inMarume = document.getElementById('store-in-marume').value;
    const outMarume = document.getElementById('store-out-marume').value;
    const rowIndex = document.getElementById('store-row-index').value;
    if(!storeName) { alert("店舗名は必須です"); return; }
    showLoading(true);
    const res = await callGas("saveStore", { rowIndex: rowIndex ? Number(rowIndex) : null, storeName: storeName, lat: lat, lng: lng, radius: radius, inMarume: inMarume, outMarume: outMarume });
    showLoading(false); alert(res.message); clearStoreForm(); loadStoreList();
  }
  async function deleteStore(rowIndex, storeName) {
    if(!confirm(`本当に店舗「${storeName}」を削除しますか？`)) return;
    showLoading(true);
    const res = await callGas("deleteStore", rowIndex);
    showLoading(false); alert(res.message); clearStoreForm(); loadStoreList();
  }

  // --- 🆕 コメント機能 ---
  let globalCommentList = [];
  async function loadCommentList() {
    try {
      const res = await callGas("getCommentList");
      globalCommentList = res.data;
      const tbody = document.getElementById('comment-table-body');
      tbody.innerHTML = '';
      if(globalCommentList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">登録されたコメント通知はありません</td></tr>';
        return;
      }
      globalCommentList.forEach(item => {
        const tr = document.createElement('tr');
        const period = (item.from || item.to) ? `${item.from || '制限なし'} ～ ${item.to || '制限なし'}` : '常時表示';
        // 改行をブラウザ用に<br>へ変換して一覧表示
        const cleanComment = item.comment.replace(/\n/g, '<br>');
        tr.innerHTML = `<td><strong>${item.target}</strong></td><td>${cleanComment}</td><td><small>${period}</small></td>
          <td>
            <button class="btn btn-edit" onclick="editComment(${item.rowIndex})">編集</button>
            <button class="btn btn-danger" onclick="deleteComment(${item.rowIndex})">削除</button>
          </td>`;
        tbody.appendChild(tr);
      });
    } catch(e) {}
  }

  function editComment(rowIndex) {
    const item = globalCommentList.find(c => c.rowIndex === rowIndex);
    if(!item) return;
    document.getElementById('comment-row-index').value = item.rowIndex;
    document.getElementById('comment-target').value = item.target;
    document.getElementById('comment-text').value = item.comment;
    document.getElementById('comment-from').value = item.from;
    document.getElementById('comment-to').value = item.to;
    document.getElementById('comment-form-title').innerText = "コメント編集 (上書き)";
    if (window.innerWidth < 768) { window.scrollTo({ top: 0, behavior: 'smooth' }); }
  }

  function clearCommentForm() {
    document.getElementById('comment-row-index').value = "";
    document.getElementById('comment-target').value = "全員";
    document.getElementById('comment-text').value = "";
    document.getElementById('comment-from').value = "";
    document.getElementById('comment-to').value = "";
    document.getElementById('comment-form-title').innerText = "コメント登録・編集";
  }

  async function submitCommentForm() {
    const target = document.getElementById('comment-target').value;
    const comment = document.getElementById('comment-text').value;
    const from = document.getElementById('comment-from').value;
    const to = document.getElementById('comment-to').value;
    const rowIndex = document.getElementById('comment-row-index').value;
    
    if(!comment) { alert("コメント内容は必須項目です"); return; }
    
    showLoading(true);
    const res = await callGas("saveComment", {
      rowIndex: rowIndex ? Number(rowIndex) : null,
      target: target ? target : "全員",
      comment: comment,
      from: from,
      to: to
    });
    showLoading(false);
    alert(res.message);
    clearCommentForm();
    loadCommentList();
  }

  async function deleteComment(rowIndex) {
    if(!confirm(`本当にこのコメント通知を削除しますか？`)) return;
    showLoading(true);
    const res = await callGas("deleteComment", rowIndex);
    showLoading(false);
    alert(res.message);
    clearCommentForm();
    loadCommentList();
  }
</script>
</body>
</html>
