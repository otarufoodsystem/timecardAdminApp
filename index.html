<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFSタイムカード 管理画面</title>
  <style>
    #protection-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #22252a; z-index: 99999;
      display: flex; justify-content: center; align-items: center;
      color: white; font-weight: bold; font-size: 1.2rem;
    }
    
    /* 💡 画面全体が上下にガタガタスクロールするのを防ぎ、すっきり固定します */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* 画面全体の大枠スクロールは禁止 */
      font-family: 'Helvetica Neue', Arial, sans-serif; 
      background-color: #f4f6f9; 
      color: #333; 
    }

    /* ヘッダーのデザイン */
    .header { 
      background-color: #22252a; 
      color: white; 
      padding: 15px 20px; 
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 30px; /* 高さを一定に固定 */
    }
    .header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 1px; }
    .header .version { font-size: 0.9rem; color: #c29d38; font-family: monospace; font-weight: bold; }
    
    /* 💡 メインコンテナ：画面下の残りスペースいっぱいに広げます */
    .container { 
      max-width: 1200px; 
      margin: 0 auto; 
      padding: 0 15px; 
      box-sizing: border-box; 
      height: calc(100% - 115px); /* ヘッダーとタブを除いた残りの高さ */
    }
    
    /* タブメニューのデザイン（上部に据え置き） */
    .tabs { 
      display: flex; 
      gap: 10px; 
      border-bottom: 2px solid #ccc; 
      padding: 10px 20px 0 20px; 
      background-color: #fff;
      height: 40px;
    }
    .tab-btn { padding: 10px 20px; font-size: 1rem; font-weight: bold; background: none; border: none; cursor: pointer; color: #666; border-radius: 5px 5px 0 0; transition: 0.2s; }
    .tab-btn.active { color: #c29d38; border-bottom: 4px solid #c29d38; background-color: #fff; }
    
    /* 💡 各タブの中身もコンテナの高さ100%に合わせる */
    .tab-content { 
      display: none; 
      background: white; 
      padding: 20px; 
      border-radius: 0 0 8px 8px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
      height: calc(100% - 40px); /* 内側の高さをフルに使う */
      box-sizing: border-box;
    }
    .tab-content.active { display: block; }

    /* 💡 グリッドレイアウトを画面の高さに固定する */
    .view-grid { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 20px; 
      height: 100%;
    }
    @media (min-width: 768px) { 
      .view-grid { 
        grid-template-columns: 350px 1fr; 
        height: 100%;
      } 
    }

    /* 左側のフォームボックス（スクロールせずその場に固定） */
    .form-box { background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #ddd; height: fit-content; }
    .form-box h3 { margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 5px; color: #444; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-weight: bold; font-size: 0.9rem; margin-bottom: 4px; color: #555; }
    .form-group input { width: 100%; padding: 8px; font-size: 0.95rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
